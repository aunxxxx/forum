修改：<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum3.3</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/fab.css">
  <link rel="stylesheet" href="css/forum.css">
  <link rel="stylesheet" href="css/drawer.css">
</head>

<body class="page">

<div class="app">

  <!-- =========================
       TOPBAR
  ========================== -->
  <header class="topbar">
    <div class="logo">铁</div>

    <nav class="nav">
      <span>Home</span>
      <span>大事件</span>
      <span class="active">铁汁窝</span>
    </nav>

    <!-- avatar（未来用户页入口） -->
    <div class="avatar-wrap">
      <img class="avatar" src="https://i.pravatar.cc/40" data-user-id="me">
    </div>
  </header>

  <!-- =========================
       MAIN
  ========================== -->
  <main class="container">

    <!-- HOT -->
    <section class="hot-section">
      <div class="hot-header">
        <div class="hot-title">🔥 热门词条</div>
      </div>

      <div class="hot-list">
        <div class="hot-item">
          <span>第一位认证用户</span>
          <span>🔥 3</span>
        </div>

        <div class="hot-item">
          <span>契弟广场</span>
          <span>🔥 2</span>
        </div>
      </div>
    </section>

    <!-- POSTS -->
    <section class="posts-list" id="postsList"></section>

  </main>

  <!-- FAB -->
  <div class="fab" id="fab">+</div>

</div>

<!-- =========================
     EDITOR
========================= -->
<div class="editor-overlay" id="editor">
  <div class="editor-box">

    <div class="editor-top">
      <button id="closeEditor" class="close-btn">✕</button>
      <button id="submitPost">发布</button>
    </div>

    <textarea id="postInput"></textarea>

    <input type="file" id="imageInput" hidden />
    <div class="upload-btn" id="uploadBtn">上传图片</div>

    <img id="previewImage" class="preview-image" />

  </div>
</div>

<!-- =========================
     COMMENT DRAWER
========================= -->
<div class="drawer-overlay" id="commentOverlay">
  <div class="drawer" id="commentDrawer">

    <div class="drawer-handle-wrap">
      <div class="drawer-handle"></div>
    </div>

    <div class="drawer-header">
      <div class="drawer-title">评论</div>
      <div class="drawer-close">✕</div>
    </div>

    <div class="drawer-content">

      <!-- COMMENT ITEM -->
      <div class="comment">

        <!-- PC reply -->
        <div class="comment-left">
          <button class="reply-btn">↩</button>
        </div>

        <div class="comment-main">

          <div class="user-line">
            <a class="avatar-wrap">
              <img class="avatar" src="https://i.pravatar.cc/40?img=2" data-user-id="1">
            </a>

            <div class="user-info">
              <span class="badge">VIP</span>
              <span class="username">李四</span>
            </div>
          </div>

          <div class="comment-content">
            这个 drawer 已经开始有 App 感了。
          </div>

        </div>

        <!-- like（⭐关键：补 data-like-id） -->
        <div class="comment-right">
          <button class="like-btn" data-like-id="comment_demo_1">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path d="M12 21s-8-4.5-8-11a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 6.5-8 11-8 11z"/>
            </svg>
            <span class="like-count">12</span>
          </button>
        </div>

      </div>

    </div>

  </div>
</div>

<!-- =========================
     LIKE DRAWER
========================= -->
<div class="drawer-overlay" id="likeOverlay">
  <div class="drawer" id="likeDrawer">

    <div class="drawer-handle-wrap">
      <div class="drawer-handle"></div>
    </div>

    <div class="drawer-header">
      <div class="drawer-title">点赞</div>
      <div class="drawer-close">✕</div>
    </div>

    <div class="drawer-content">

      <div class="like-item">

        <div class="like-left">
          <a class="avatar-wrap">
            <img class="avatar" src="https://i.pravatar.cc/40?img=3" data-user-id="3">
          </a>

          <div class="user-info">
            <span class="badge">创始</span>
            <span class="username">马睿婕</span>
          </div>
        </div>

        <div class="like-right">×18</div>

      </div>

    </div>

  </div>
</div>

<script type="module" src="js/forum.js"></script>

</body>
</html>
