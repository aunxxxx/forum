<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forum1.1</title>

  <link rel="stylesheet" href="css/forum.css">
</head>

<body>

  <!-- 发帖页 -->
  <div class="editor-overlay" id="editor">
    <div class="editor-box">

      <div class="editor-top">
        <button id="closeEditor" class="close-btn">✕</button>
        <button id="submitPost">发布</button>
      </div>

      <textarea id="postInput" placeholder="分享点什么吧..."></textarea>

      <input type="file" id="imageInput" accept="image/*" hidden />

      <div class="upload-btn" id="uploadBtn">上传图片</div>

      <img id="previewImage" class="preview-image" />

    </div>
  </div>

  <!-- 顶部 -->
  <header class="topbar">
    <div class="logo">铁</div>

    <nav class="nav">
      <span>Home</span>
      <span>大事件</span>
      <span class="active">铁汁窝</span>
    </nav>

    <div class="user-avatar">🐯</div>
  </header>

  <!-- 主体 -->
  <main class="container">

    <section class="hot-section">
      <div class="hot-header">
        <div class="hot-title">🔥 热门词条</div>
        <div class="publish-btn">+</div>
      </div>

      <div class="hot-list">
        <div class="hot-item">
          <span>第一位认证用户</span>
          <span>🔥 3</span>
        </div>

        <div class="hot-item">
          <span>户报到</span>
          <span>🔥 3</span>
        </div>
      </div>
    </section>

    <section class="posts-list" id="postsList"></section>

  </main>

  <div class="fab" id="fab">+</div>

  <script type="module" src="js/forum.js"></script>

</body>
</html>
