<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum2.99</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/fab.css">
  <link rel="stylesheet" href="css/forum.css">
  <link rel="stylesheet" href="css/drawer.css">
</head>

<body class="page">

<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">铁</div>

    <nav class="nav">
      <span>Home</span>
      <span>大事件</span>
      <span class="active">铁汁窝</span>
    </nav>

    <div class="user-avatar">🐯</div>
  </header>

  <!-- MAIN -->
  <main class="container">

    <section class="hot-section">
      <div class="hot-header">
        <div class="hot-title">🔥 热门词条</div>
      </div>

      <div class="hot-list">
        <div class="hot-item">
          <span>第一位认证用户</span>
          <span>🔥 3</span>
        </div>

        <div class="hot-item">
          <span>契弟广场</span>
          <span>🔥 2</span>
        </div>
      </div>
    </section>

    <section class="posts-list" id="postsList"></section>

  </main>

  <!-- FAB -->
  <div class="fab" id="fab">+</div>

</div>

<!-- EDITOR -->
<div class="editor-overlay" id="editor">
  <div class="editor-box">

    <div class="editor-top">
      <button id="closeEditor" class="close-btn">✕</button>
      <button id="submitPost">发布</button>
    </div>

    <textarea id="postInput"></textarea>

    <input type="file" id="imageInput" hidden />
    <div class="upload-btn" id="uploadBtn">上传图片</div>

    <img id="previewImage" class="preview-image" />

  </div>
</div>

<!-- COMMENT DRAWER -->
<div class="drawer-overlay" id="commentOverlay">
  <div class="drawer" id="commentDrawer">

    <div class="drawer-handle-wrap">
      <div class="drawer-handle"></div>
    </div>

    <div class="drawer-header">
      <div class="drawer-title">评论</div>
      <div class="drawer-close">✕</div>
    </div>

    <div class="drawer-content">
      <div class="comment-item">
        <div class="comment-avatar">李</div>
        <div class="comment-main">
          <div class="comment-name">李四 · 认证练习生</div>
          <div class="comment-text">这个 drawer 已经开始有 App 感了。</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- LIKE DRAWER -->
<div class="drawer-overlay" id="likeOverlay">
  <div class="drawer" id="likeDrawer">

    <div class="drawer-handle-wrap">
      <div class="drawer-handle"></div>
    </div>

    <div class="drawer-header">
      <div class="drawer-title">点赞</div>
      <div class="drawer-close">✕</div>
    </div>

    <div class="drawer-content">
      <div class="like-item">
        <div class="like-left">
          <div class="like-avatar">马</div>
          <div>
            <div class="like-name">马睿婕</div>
            <div class="like-title">创始成员</div>
          </div>
        </div>
        <div class="like-count">×18</div>
      </div>
    </div>

  </div>
</div>

<script type="module" src="js/forum.js"></script>

</body>
</html>
