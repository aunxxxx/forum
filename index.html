<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum3.71</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/fab.css">
  <link rel="stylesheet" href="css/forum.css">
  <link rel="stylesheet" href="css/drawer.css">
</head>

<body class="page">

<div class="app">

  <!-- =========================
       TOPBAR
  ========================== -->
  <header class="topbar">
    <div class="logo">铁</div>

    <nav class="nav">
      <span>Home</span>
      <span>大事件</span>
      <span class="active">铁汁窝</span>
    </nav>

    <!-- avatar（未来用户页入口） -->
    <div class="avatar-wrap">
      <img class="avatar" src="https://i.pravatar.cc/40" data-user-id="me">
    </div>
  </header>

  <!-- =========================
       MAIN
  ========================== -->
  <main class="container">

    <!-- HOT -->
    <section class="hot-section">
      <div class="hot-header">
        <div class="hot-title">🔥 热门词条</div>
      </div>

      <div class="hot-list">
        <div class="hot-item">
          <span>第一位认证用户</span>
          <span>🔥 3</span>
        </div>

        <div class="hot-item">
          <span>契弟广场</span>
          <span>🔥 2</span>
        </div>
      </div>
    </section>

    <!-- POSTS -->
    <section class="posts-list" id="postsList"></section>

  </main>

  <!-- FAB -->
  <div class="fab" id="fab">+</div>

</div>

<!-- =========================
     EDITOR
========================= -->
<div class="editor-overlay" id="editor">
  <div class="editor-box">

    <div class="editor-top">
      <button id="closeEditor" class="close-btn">✕</button>
      <button id="submitPost">发布</button>
    </div>

    <textarea id="postInput"></textarea>

    <input type="file" id="imageInput" hidden />
    <div class="upload-btn" id="uploadBtn">上传图片</div>

    <img id="previewImage" class="preview-image" />

  </div>
</div>

<!-- =========================
     COMMENT DRAWER
========================= -->
<div class="drawer-overlay" id="commentOverlay">

  <div class="drawer" id="commentDrawer">

    <!-- HANDLE -->
    <div class="drawer-handle-wrap">
      <div class="drawer-handle"></div>
    </div>

    <!-- HEADER -->
    <div class="drawer-header">

      <div class="drawer-title">
        评论
      </div>

      <div class="drawer-close">
        ✕
      </div>

    </div>

    <!-- COMMENTS -->
    <div
      class="drawer-content"
      id="drawerComments"
    >

      <!-- COMMENT -->
      <div
        class="comment"
        data-comment-id="c1"
      >

        <!-- 主评论 -->
        <div class="comment-main-block">

          <!-- USER -->
          <div class="user-line">

            <a
              class="avatar-link"
              href="/user.html?id=1"
            >

              <img
                class="avatar"
                src="https://i.pravatar.cc/40?img=2"
              >

            </a>

            <div class="user-meta">

              <div class="name-row">

                <span class="badge founder">
                  创始
                </span>

                <a
                  class="username"
                  href="/user.html?id=1"
                >
                  李四
                </a>

              </div>

            </div>

          </div>

          <!-- CONTENT -->
          <div class="comment-content">

            这个 drawer 已经开始有 App 感了。

          </div>

          <!-- ACTIONS -->
          <div class="comment-actions">

            <!-- REPLY -->
            <button class="reply-btn">

              <svg
                viewBox="0 0 24 24"
                class="icon"
              >

                <path
                  d="M9 14L4 9l5-5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />

                <path
                  d="M20 20c0-6-4-11-11-11H4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />

              </svg>

            </button>

            <!-- LIKE -->
            <button
              class="like-btn"
              data-like-id="comment_c1"
            >

              <svg
                viewBox="0 0 24 24"
                class="icon like-icon"
              >

                <path
                  d="M12.1 20.3l-.1.1-.1-.1C7 16 4 13.2 4 9.8C4 7.2 6 5.2 8.6 5.2C10.1 5.2 11.5 5.9 12.4 7.1C13.3 5.9 14.7 5.2 16.2 5.2C18.8 5.2 20.8 7.2 20.8 9.8C20.8 13.2 17.8 16 12.9 20.3Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />

              </svg>

              <span class="like-count">
                12
              </span>

            </button>

          </div>

        </div>

        <!-- 楼中楼 -->
        <div class="reply-list">

          <!-- REPLY -->
          <div class="reply-item">

            <a
              class="reply-user"
              href="/user.html?id=3"
            >
              王五
            </a>

            <span class="reply-text">
              回复得确实有 App 那味了。
            </span>

          </div>

          <!-- REPLY -->
          <div class="reply-item">

            <a
              class="reply-user"
              href="/user.html?id=4"
            >
              张三
            </a>

            <span class="reply-to">
              回复
            </span>

            <a
              class="reply-user"
              href="/user.html?id=3"
            >
              王五
            </a>

            <span class="reply-text">
              特别像即刻评论区。
            </span>

          </div>

        </div>

      </div>

    </div>

    <!-- INPUT AREA -->
    <div class="drawer-input-area">

      <!-- REPLY PREVIEW -->
      <div
        class="reply-preview"
        id="replyPreview"
      >

        <div class="reply-preview-text">

          回复 李四：这个 drawer 已经开始有 App 感了。

        </div>

        <button id="cancelReply">
          ✕
        </button>

      </div>

      <!-- INPUT -->
      <div class="comment-input-fixed">

        <textarea
          id="commentInput"
          placeholder="发一条友善评论..."
        ></textarea>

        <button id="sendCommentBtn">

          <svg
            viewBox="0 0 24 24"
            width="18"
            height="18"
            fill="none"
          >

            <path
              d="M3 20L21 12L3 4V10L15 12L3 14V20Z"
              fill="currentColor"
            />

          </svg>

        </button>

      </div>

    </div>

  </div>

</div>

<!-- =========================
     LIKE DRAWER
========================= -->
<div class="drawer-overlay" id="likeOverlay">
  <div class="drawer" id="likeDrawer">

    <div class="drawer-handle-wrap">
      <div class="drawer-handle"></div>
    </div>

    <div class="drawer-header">
      <div class="drawer-title">点赞</div>
      <div class="drawer-close">✕</div>
    </div>

    <div class="drawer-content">

      <div class="like-item">

        <div class="like-left">
          <a class="avatar-wrap">
            <img class="avatar" src="https://i.pravatar.cc/40?img=3" data-user-id="3">
          </a>

          <div class="user-info">
            <span class="badge">创始</span>
            <span class="username">马睿婕</span>
          </div>
        </div>

        <div class="like-right">×18</div>

      </div>

    </div>

  </div>
</div>

<script type="module" src="js/forum.js"></script>

</body>
</html>
