<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=yes"
  />

  <title>Forum3.90</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/fab.css">
  <link rel="stylesheet" href="css/forum.css">
  <link rel="stylesheet" href="css/drawer.css">
</head>

<body class="page">

  <div class="app">

    <!-- =========================
         TOPBAR
    ========================== -->
    <header class="topbar">

      <div class="logo">
        铁
      </div>

      <nav class="nav">

        <span>Home</span>

        <span>大事件</span>

        <span class="active">
          铁汁窝
        </span>

      </nav>

      <!-- avatar -->
      <div class="avatar-wrap">

        <img
          class="avatar"
          src="https://i.pravatar.cc/40"
          data-user-id="me"
        >

      </div>

    </header>

    <!-- =========================
         MAIN
    ========================== -->
    <main class="container">

      <!-- HOT -->
      <section class="hot-section">

        <div class="hot-header">

          <div class="hot-title">
            🔥 热门词条
          </div>

        </div>

        <div class="hot-list">

          <div class="hot-item">

            <span>
              第一位认证用户
            </span>

            <span>
              🔥 3
            </span>

          </div>

          <div class="hot-item">

            <span>
              契弟广场
            </span>

            <span>
              🔥 2
            </span>

          </div>

        </div>

      </section>

      <!-- POSTS -->
      <section
        class="posts-list"
        id="postsList"
      ></section>

    </main>

    <!-- FAB -->
    <button
      class="fab"
      type="button"
      id="fab"
    >
      +
    </button>

  </div>

  <!-- =========================
       EDITOR
  ========================== -->
  <div
    class="editor-overlay"
    id="editor"
  >

    <div class="editor-box">

      <div class="editor-top">

        <button
          id="closeEditor"
          class="close-btn"
          type="button"
        >
          ✕
        </button>

        <button 
          id="submitPost"
          type="button"
          >
          发布
        </button>

      </div>

     <textarea
  id="postInput"
  placeholder="发点什么..."
  rows="4"
></textarea>

      <input
        type="file"
        id="imageInput"
        hidden
      />

     <button
  class="upload-btn"
  id="uploadBtn"
  type="button"
>
  上传图片
</button>

      <img
        id="previewImage"
        class="preview-image"
      />

    </div>

  </div>

  <!-- =========================
       COMMENT DRAWER (最终结构对齐版)
  ========================= -->
  <div
    class="drawer-overlay"
    id="commentOverlay"
  >

    <div
      class="drawer"
      id="commentDrawer"
    >

      <!-- HANDLE -->
      <div class="drawer-handle-wrap">
        <div class="drawer-handle"></div>
      </div>

      <!-- HEADER -->
      <div class="drawer-header">
        评论
      </div>

      <!-- SCROLL AREA (drawer-content) -->
      <div class="drawer-content">

        <!-- COMMENT 1 -->
        <div class="comment" data-comment-id="c1" data-user-id="1">

          <div class="comment-avatar-wrap">
            <img
              class="comment-avatar"
              src="https://i.pravatar.cc/40?img=2"
              alt=""
            >
          </div>

          <div class="comment-body">

            <!-- 用户信息 - 统一 user-line 结构 -->
            <div class="comment-top">
              <div class="user-line">
                <img class="avatar" src="https://i.pravatar.cc/40?img=2" alt="" style="width: 24px; height: 24px; border-radius: 50%;">
                <div class="user-meta">
                  <span class="badge founder">创始</span>
                  <span class="username">李四</span>
                  <span class="comment-time">2分钟前</span>
                </div>
              </div>

              <!-- 操作区 -->
              <div class="comment-actions">

                <button class="icon-btn reply-btn" type="button">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 14L4 9l5-5" />
                    <path d="M20 20c0-6-4-11-11-11H4" />
                  </svg>
                </button>

                <div class="post-like-wrap">
                  <button class="like-btn" type="button" data-like-id="comment_c1">
                    <svg class="like-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M12.1 20.3l-.1.1-.1-.1C7 16 4 13.2 4 9.8C4 7.2 6 5.2 8.6 5.2C10.1 5.2 11.5 5.9 12.4 7.1C13.3 5.9 14.7 5.2 16.2 5.2C18.8 5.2 20.8 7.2 20.8 9.8C20.8 13.2 17.8 16 12.9 20.3Z" />
                    </svg>
                  </button>
                  <button class="like-count-trigger" type="button" data-post-id="comment_c1">12</button>
                </div>

              </div>
            </div>

            <!-- 内容 -->
            <div class="comment-content">
              这个 drawer 已经开始有 App 感了。
            </div>

            <!-- REPLY THREAD - 统一 reply button 结构 -->
            <div class="reply-list">

              <!-- REPLY 1 -->
              <div class="reply-item" data-id="reply_1" data-type="reply">

                <!-- AVATAR -->
                <img class="reply-avatar" src="https://i.pravatar.cc/40?img=6" data-user-id="u2">

                <!-- MAIN -->
                <div class="reply-main">

                  <!-- USER -->
                  <div class="reply-user-line">
                    <span class="badge vip">元老</span>
                    <span class="reply-username">王五</span>
                    <span class="reply-arrow">→</span>
                    <span class="reply-target">李四</span>
                  </div>

                  <!-- CONTENT -->
                  <div class="reply-content">
                    回复得确实有 App 那味了。
                  </div>

                </div>

                <!-- LIKE - 统一 reply-like-btn like-btn 结构 -->
                <button class="reply-like-btn like-btn" type="button" data-like-id="reply_1">
                  <svg class="like-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.1 20.3l-.1.1-.1-.1C7 16 4 13.2 4 9.8C4 7.2 6 5.2 8.6 5.2C10.1 5.2 11.5 5.9 12.4 7.1C13.3 5.9 14.7 5.2 16.2 5.2C18.8 5.2 20.8 7.2 20.8 9.8C20.8 13.2 17.8 16 12.9 20.3Z"/>
                  </svg>
                  <span class="reply-like-count">3</span>
                </button>

              </div>

              <!-- REPLY 2 -->
              <div class="reply-item" data-id="reply_2" data-type="reply">

                <!-- AVATAR -->
                <img class="reply-avatar" src="https://i.pravatar.cc/40?img=5" data-user-id="u3">

                <!-- MAIN -->
                <div class="reply-main">

                  <!-- USER -->
                  <div class="reply-user-line">
                    <span class="badge founder">创始</span>
                    <span class="reply-username">张三</span>
                    <span class="reply-arrow">→</span>
                    <span class="reply-target">王五</span>
                  </div>

                  <!-- CONTENT -->
                  <div class="reply-content">
                    特别像即刻评论区。
                  </div>

                </div>

                <!-- LIKE - 统一 reply-like-btn like-btn 结构 -->
                <button class="reply-like-btn like-btn" type="button" data-like-id="reply_2">
                  <svg class="like-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.1 20.3l-.1.1-.1-.1C7 16 4 13.2 4 9.8C4 7.2 6 5.2 8.6 5.2C10.1 5.2 11.5 5.9 12.4 7.1C13.3 5.9 14.7 5.2 16.2 5.2C18.8 5.2 20.8 7.2 20.8 9.8C20.8 13.2 17.8 16 12.9 20.3Z"/>
                  </svg>
                  <span class="reply-like-count">8</span>
                </button>

              </div>

            </div>

          </div>
        </div>

      </div>

      <!-- INPUT FIXED BAR -->
      <div class="drawer-input-area">

        <div class="reply-preview hidden" id="replyPreview" style="display: none;">
          <span class="reply-preview-text">回复 @用户</span>
          <button id="cancelReply" type="button">×</button>
        </div>

        <div class="mention-panel" id="mentionPanel"></div>

        <div class="comment-input-fixed">
          <textarea id="commentInput" placeholder="发一条友善评论..." rows="1"></textarea>

          <button id="sendCommentBtn" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
              <path d="M3 20L21 12L3 4V10L15 12L3 14V20Z" fill="currentColor" />
            </svg>
          </button>
        </div>

      </div>

    </div>

  </div>

  <!-- =========================
       LIKE DRAWER
  ========================== -->
  <div
    class="drawer-overlay"
    id="likeOverlay"
  >

    <div
      class="drawer"
      id="likeDrawer"
    >

      <div class="drawer-handle-wrap">

        <div class="drawer-handle"></div>

      </div>

      <div class="drawer-header">

        <div class="drawer-title">
          点赞
        </div>

        <button 
          class="drawer-close"
          type="button"
          >
          ✕
        </button>

      </div>

      <div class="drawer-content">

        <div class="like-item">

          <div class="like-left">

            <a class="avatar-wrap">

              <img
                class="avatar"
                src="https://i.pravatar.cc/40?img=3"
                data-user-id="3"
              >

            </a>

            <div class="user-info">

              <span class="badge">
                创始
              </span>

              <span class="username">
                马睿婕
              </span>

            </div>

          </div>

          <div class="like-right">
            ×18
          </div>

        </div>

      </div>

    </div>

  </div>

  <script
    type="module"
    src="js/forum.js"
  ></script>

</body>
</html>
