<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forum</title>

  <link rel="stylesheet" href="css/forum.css">
</head>

<body>

  <!-- 顶部 -->
  <header class="topbar">

    <div class="logo">铁</div>

    <nav class="nav">
      <span>Home</span>
      <span>大事件</span>
      <span class="active">铁汁窝</span>
    </nav>

    <div class="user-avatar">🐯</div>

  </header>

  <!-- 主体 -->
  <main class="container">

    <!-- 热门 -->
    <section class="hot-section">

      <div class="hot-header">
        <div class="hot-title">🔥 热门词条</div>
        <div class="publish-btn">+</div>
      </div>

      <div class="hot-list">

        <div class="hot-item">
          <span>第一位认证用户</span>
          <span>🔥 3</span>
        </div>

        <div class="hot-item">
          <span>户报到</span>
          <span>🔥 3</span>
        </div>

      </div>

    </section>

    <!-- 帖子 -->
    <section class="posts-list" id="postsList"></section>

  </main>

  <script type="module" src="js/forum.js"></script>

</body>
</html>
