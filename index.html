<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Forum2.3</title>

  <!-- 基础 -->
  <link rel="stylesheet" href="css/base.css">

  <!-- 发帖页 -->
  <link rel="stylesheet" href="css/editor.css">

  <!-- FAB -->
  <link rel="stylesheet" href="css/fab.css">

  <!-- 主论坛 -->
  <link rel="stylesheet" href="css/forum.css">

   <!-- 抽屉效果 -->
  <link rel="stylesheet" href="css/drawer.css">
  
</head>

<body>

  <!-- 发帖页 -->
  <div
    class="editor-overlay"
    id="editor"
  >

    <div class="editor-box">

      <!-- 顶部 -->
      <div class="editor-top">

        <button
          id="closeEditor"
          class="close-btn"
        >
          ✕
        </button>

        <button id="submitPost">
          发布
        </button>

      </div>

      <!-- 输入框 -->
      <textarea
        id="postInput"
        placeholder="分享点什么吧..."
      ></textarea>

      <!-- 上传 -->
      <input
        type="file"
        id="imageInput"
        accept="image/*"
        hidden
      />

      <div
        class="upload-btn"
        id="uploadBtn"
      >
        上传图片
      </div>

      <!-- 预览 -->
      <img
        id="previewImage"
        class="preview-image"
      />

    </div>

  </div>

  <!-- 顶部导航 -->
  <header class="topbar">

    <!-- Logo -->
    <div class="logo">
      铁
    </div>

    <!-- 导航 -->
    <nav class="nav">

      <span>
        Home
      </span>

      <span>
        大事件
      </span>

      <span class="active">
        铁汁窝
      </span>

    </nav>

    <!-- 用户 -->
    <div class="user-avatar">
      🐯
    </div>

  </header>

  <!-- 主体 -->
  <main class="container">

    <!-- 热门 -->
    <section class="hot-section">

      <div class="hot-header">

        <div class="hot-title">
          🔥 热门词条
        </div>

      </div>

      <!-- 热门列表 -->
      <div class="hot-list">

        <div class="hot-item">

          <span>
            第一位认证用户
          </span>

          <span>
            🔥 3
          </span>

        </div>

        <div class="hot-item">

          <span>
            契弟广场
          </span>

          <span>
            🔥 2
          </span>

        </div>

      </div>

    </section>

    <!-- 帖子 -->
    <section
      class="posts-list"
      id="postsList"
    ></section>

  </main>

  <!-- FAB -->
  <div
    class="fab"
    id="fab"
  >
    +
  </div>

</div>

<!-- 评论 Drawer -->
<div class="drawer-overlay" id="drawerOverlay">

  <div class="drawer" id="drawer">

    <div class="drawer-handle-wrap">
      <div class="drawer-handle"></div>
    </div>

    <div class="drawer-content">

      <div class="comment-item">

        <div class="comment-avatar">
          李
        </div>

        <div class="comment-main">

          <div class="comment-name">
            李四 · 认证练习生
          </div>

          <div class="comment-text">
            这个 drawer 已经开始有 App 感了。
          </div>

        </div>

      </div>

      <div class="comment-item">

        <div class="comment-avatar">
          张
        </div>

        <div class="comment-main">

          <div class="comment-name">
            张三 · 创始成员
          </div>

          <div class="comment-text">
            下一步可以开始做回复链。
          </div>

        </div>

      </div>

    </div>

  </div>

</div>
  
  <!-- JS -->
  <script
    type="module"
    src="js/forum.js"
  ></script>

</body>

 <div class="app">
   
</html>
