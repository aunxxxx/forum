<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forum</title>

  <link rel="stylesheet" href="css/forum.css">
</head>
  
<!-- 发帖层 -->
<div class="editor-overlay" id="editor">

  <div class="editor-box">

    <!-- 顶部 -->
    <div class="editor-top">

      <button id="closeEditor">
        取消
      </button>

      <button id="submitPost">
        发布
      </button>

    </div>

    <!-- 输入 -->
    <textarea
      id="postInput"
      placeholder="分享点什么吧..."
    ></textarea>

    <!-- 上传 -->
    <input
      type="file"
      id="imageInput"
      accept="image/*"
      hidden
    />

    <div class="upload-btn" id="uploadBtn">
      上传图片
    </div>

    <!-- 预览 -->
    <img
      id="previewImage"
      class="preview-image"
    />

  </div>

</div>
  
<body>

  <!-- 顶部 -->
  <header class="topbar">

    <div class="logo">铁</div>

    <nav class="nav">
      <span>Home</span>
      <span>大事件</span>
      <span class="active">铁汁窝</span>
    </nav>

    <div class="user-avatar">🐯</div>

  </header>

  <!-- 主体 -->
  <main class="container">

    <!-- 热门 -->
    <section class="hot-section">

      <div class="hot-header">
        <div class="hot-title">🔥 热门词条</div>
        <div class="publish-btn">+</div>
      </div>

      <div class="hot-list">

        <div class="hot-item">
          <span>第一位认证用户</span>
          <span>🔥 3</span>
        </div>

        <div class="hot-item">
          <span>户报到</span>
          <span>🔥 3</span>
        </div>

      </div>

    </section>

    <!-- 帖子 -->
    <section class="posts-list" id="postsList"></section>

  </main>

  <script type="module" src="js/forum.js"></script>

</body>
</html>
